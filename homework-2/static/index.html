<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Support Ticket Manager</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <header class="app-header">
    <h1>🎧 Support Ticket Manager</h1>
    <div class="header-actions">
      <button id="btn-new-ticket" class="btn btn-primary">+ New Ticket</button>
      <button id="btn-import" class="btn btn-secondary">⇪ Bulk Import</button>
    </div>
  </header>

  <main class="app-main">
    <section class="filters-bar" aria-label="Filters">
      <div class="filter-field">
        <label for="filter-category">Category</label>
        <select id="filter-category">
          <option value="">All categories</option>
        </select>
      </div>
      <div class="filter-field">
        <label for="filter-priority">Priority</label>
        <select id="filter-priority">
          <option value="">All priorities</option>
        </select>
      </div>
      <div class="filter-field">
        <label for="filter-status">Status</label>
        <select id="filter-status">
          <option value="">All statuses</option>
        </select>
      </div>
      <div class="filter-field">
        <label for="filter-customer">Customer ID</label>
        <input id="filter-customer" type="text" placeholder="e.g. cust-123" />
      </div>
      <div class="filter-actions">
        <button id="btn-apply-filters" class="btn btn-primary">Apply</button>
        <button id="btn-clear-filters" class="btn btn-ghost">Clear</button>
      </div>
    </section>

    <section class="list-section">
      <div id="list-status" class="list-status"></div>
      <div class="ticket-table-wrapper">
        <table class="ticket-table" id="ticket-table">
          <thead>
            <tr>
              <th>Subject</th>
              <th>Customer</th>
              <th>Category</th>
              <th>Priority</th>
              <th>Status</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="ticket-table-body">
          </tbody>
        </table>
      </div>

      <div class="pagination" id="pagination">
        <button id="btn-prev-page" class="btn btn-ghost">&laquo; Prev</button>
        <span id="pagination-info">Page 1</span>
        <button id="btn-next-page" class="btn btn-ghost">Next &raquo;</button>
        <select id="page-size-select" aria-label="Page size">
          <option value="10">10 / page</option>
          <option value="20" selected>20 / page</option>
          <option value="50">50 / page</option>
          <option value="100">100 / page</option>
        </select>
      </div>
    </section>
  </main>

  <!-- Ticket create/edit modal -->
  <div id="ticket-form-modal" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="ticket-form-title">
      <div class="modal-header">
        <h2 id="ticket-form-title">New Ticket</h2>
        <button class="btn-close" data-close-modal="ticket-form-modal" aria-label="Close">&times;</button>
      </div>
      <form id="ticket-form" class="modal-body" novalidate>
        <input type="hidden" id="ticket-form-id" />

        <div class="form-row">
          <div class="form-field">
            <label for="field-customer-id">Customer ID *</label>
            <input id="field-customer-id" name="customer_id" type="text" maxlength="100" required />
            <small class="field-error" data-error-for="customer_id"></small>
          </div>
          <div class="form-field">
            <label for="field-customer-email">Customer Email *</label>
            <input id="field-customer-email" name="customer_email" type="email" required />
            <small class="field-error" data-error-for="customer_email"></small>
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label for="field-customer-name">Customer Name *</label>
            <input id="field-customer-name" name="customer_name" type="text" maxlength="200" required />
            <small class="field-error" data-error-for="customer_name"></small>
          </div>
          <div class="form-field">
            <label for="field-assigned-to">Assigned To</label>
            <input id="field-assigned-to" name="assigned_to" type="text" />
          </div>
        </div>

        <div class="form-field">
          <label for="field-subject">Subject * <span class="char-count" id="subject-count">0/200</span></label>
          <input id="field-subject" name="subject" type="text" maxlength="200" required />
          <small class="field-error" data-error-for="subject"></small>
        </div>

        <div class="form-field">
          <label for="field-description">Description * (10-2000 chars) <span class="char-count" id="description-count">0/2000</span></label>
          <textarea id="field-description" name="description" rows="4" maxlength="2000" required></textarea>
          <small class="field-error" data-error-for="description"></small>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label for="field-category">Category</label>
            <select id="field-category" name="category">
              <option value="">Auto / unset</option>
            </select>
          </div>
          <div class="form-field">
            <label for="field-priority">Priority</label>
            <select id="field-priority" name="priority">
              <option value="">Auto / unset</option>
            </select>
          </div>
          <div class="form-field" id="field-status-wrapper">
            <label for="field-status">Status</label>
            <select id="field-status" name="status"></select>
          </div>
        </div>

        <div class="form-field">
          <label for="field-tags">Tags (comma separated)</label>
          <input id="field-tags" name="tags" type="text" placeholder="e.g. urgent, login, mobile" />
        </div>

        <fieldset class="metadata-fieldset">
          <legend>Metadata</legend>
          <div class="form-row">
            <div class="form-field">
              <label for="field-meta-source">Source</label>
              <select id="field-meta-source" name="meta_source"></select>
            </div>
            <div class="form-field">
              <label for="field-meta-device">Device Type</label>
              <select id="field-meta-device" name="meta_device_type">
                <option value="">Unset</option>
              </select>
            </div>
            <div class="form-field">
              <label for="field-meta-browser">Browser</label>
              <input id="field-meta-browser" name="meta_browser" type="text" />
            </div>
          </div>
        </fieldset>

        <div class="form-field checkbox-field" id="auto-classify-field">
          <label>
            <input id="field-auto-classify" type="checkbox" />
            Auto-classify on save
          </label>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" data-close-modal="ticket-form-modal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="btn-submit-ticket-form">Save Ticket</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Ticket detail modal -->
  <div id="ticket-detail-modal" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="ticket-detail-title">
      <div class="modal-header">
        <h2 id="ticket-detail-title">Ticket Details</h2>
        <button class="btn-close" data-close-modal="ticket-detail-modal" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body" id="ticket-detail-body"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="btn-detail-classify">Auto-Classify</button>
        <button type="button" class="btn btn-primary" id="btn-detail-edit">Edit</button>
        <button type="button" class="btn btn-danger" id="btn-detail-delete">Delete</button>
      </div>
    </div>
  </div>

  <!-- Bulk import modal -->
  <div id="import-modal" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="import-title">
      <div class="modal-header">
        <h2 id="import-title">Bulk Import Tickets</h2>
        <button class="btn-close" data-close-modal="import-modal" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <p>Upload a CSV, JSON, or XML file containing tickets.</p>
        <div class="form-field">
          <label for="import-file">File</label>
          <input id="import-file" type="file" accept=".csv,.json,.xml,text/csv,application/json,text/xml,application/xml" />
        </div>
        <div class="form-field checkbox-field">
          <label>
            <input id="import-auto-classify" type="checkbox" />
            Auto-classify imported tickets
          </label>
        </div>
        <div id="import-summary" class="import-summary hidden"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" data-close-modal="import-modal">Close</button>
        <button type="button" class="btn btn-primary" id="btn-submit-import">Import</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
